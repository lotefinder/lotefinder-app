name: Actualizar propiedades

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 lxml supabase

      - name: Correr scraper
        run: python scraper_zonaprop.py

      - name: Subir a Supabase
        run: python "subir a supabase.py"
